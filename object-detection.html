<!DOCTYPE html>
<html>
  <head>
    <title>Image Recognition Web App</title>
    <style>
      #video {
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <h1>Image Recognition Web App</h1>
    <video id="video" width="400" height="300" autoplay></video>
    <canvas id="canvas" width="400" height="300"></canvas>
    <div id="prediction"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.8.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
    <script>
      // Load the MobileNet model
      async function loadModel() {
        console.log("Loading the model...")
        const model = await mobilenet.load();
        return model;
        console.log("The model is loaded")
      }

      // Start the camera
      async function startCamera() {
        console.log("Starting the camera...")

        const videoElement = document.getElementById('video');
        if (navigator.mediaDevices.getUserMedia) {
          navigator.mediaDevices
            .getUserMedia({ video: true })
            .then(function (stream) {
              videoElement.srcObject = stream;
            })
            .catch(function (error) {
              console.log('Error accessing the camera: ', error);
            });
        }

        console.log("The camera is started")
      }

      // Run prediction on the image
      async function predictImage(model) {
        // console.log("Predicting for the image...")

        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const predictionElement = document.getElementById('prediction');
        const context = canvasElement.getContext('2d');

        context.drawImage(videoElement, 0, 0, 400, 300);
        const image = context.getImageData(0, 0, 400, 300);

        const mobilenetModel = await model;
        const predictions = await mobilenetModel.classify(image);

        predictionElement.innerHTML = `Prediction: ${predictions[0].className}`;
        requestAnimationFrame(() => predictImage(mobilenetModel));

        // console.log("The prediction has been made")
      }

      // Start the application
      async function startApp() {
        console.log("Starting the app...")

        const model = loadModel();
        startCamera();
        predictImage(model);

        console.log("The app has been started")
      }

      // Entry point
      startApp();
    </script>
  </body>
</html>
